<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#17326b">
  <title>Cek Status Layanan Keuangan | Septino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="status-konsultasi.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="status-page">
    <header class="status-header">
      <div class="status-header-inner">
        <div class="status-topbar">
          <a class="status-back" href="index.html" aria-label="Kembali" title="Kembali"><i data-lucide="arrow-left"></i></a>
          <span class="eyebrow"><i data-lucide="clipboard-check"></i>STATUS LAYANAN KEUANGAN</span>
        </div>
        <h1>Cek status layanan keuangan Anda</h1>
        <p>Masukkan kode layanan beserta email atau WhatsApp yang digunakan saat mendaftar.</p>
      </div>
    </header>

    <section class="status-content">
      <article class="status-card">
        <form id="statusForm" class="status-form" novalidate>
          <div class="status-field">
            <label for="consultationNumber">Kode Layanan</label>
            <input id="consultationNumber" autocomplete="off" required placeholder="Contoh: KS2607170001">
          </div>
          <div class="status-field">
            <label for="identity">Email atau Nomor WhatsApp</label>
            <input id="identity" autocomplete="email" required placeholder="Masukkan email atau WhatsApp">
          </div>
          <div id="statusAlert" class="status-alert"></div>
          <button class="status-submit" type="submit"><i data-lucide="search-check"></i><span>Cek Status Layanan</span></button>
        </form>

        <div id="statusResult" class="status-result status-result-v2" hidden>
          <div class="service-summary">
            <div class="service-summary-icon"><i data-lucide="badge-check"></i></div>
            <div class="service-summary-copy">
              <small>STATUS LAYANAN</small>
              <span id="resultStatus" class="status-badge">-</span>
            </div>
          </div>

          <div class="service-code-card">
            <span><i data-lucide="ticket-check"></i></span>
            <div>
              <small>KODE LAYANAN</small>
              <strong id="resultNumber">-</strong>
            </div>
          </div>

          <dl class="service-info-list">
            <div>
              <dt><i data-lucide="user-round"></i>Nama</dt>
              <dd id="resultName">-</dd>
            </div>
            <div>
              <dt><i data-lucide="briefcase-business"></i>Layanan</dt>
              <dd id="resultService">-</dd>
            </div>
          </dl>

          <section id="documentSection" class="status-documents" hidden>
            <div class="status-documents-heading">
              <div>
                <small>HASIL KONSULTASI</small>
                <h2>Dokumen Anda</h2>
              </div>
              <span class="status-documents-icon"><i data-lucide="files"></i></span>
            </div>
            <div id="documentList" class="status-document-list"></div>
          </section>

          <div class="status-actions">
            <a id="whatsappButton" class="status-action" href="#">
              <i data-lucide="message-circle"></i>Hubungi Financial Planner
            </a>
          </div>
        </div>
      </article>
      <footer class="status-footer">© 2026 Septino</footer>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="service.js"></script>
  <script src="status-konsultasi.js"></script>
</body>
</html>
